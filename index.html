<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羊宫妃那的树荫时光 🎬</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #1a1a1a; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        h2 { font-size: 1.3rem; margin-bottom: 20px; color: #00a1d6; }
        .main-layout { display: block; max-width: 900px; margin: 0 auto; background: #262626; border-radius: 12px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .video-container { width: 100%; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 15px; }
        video { width: 100%; display: block; }
        .playlist { width: 100%; text-align: left; background: #333; padding: 12px; border-radius: 8px; }
        .playlist h3 { margin: 0 0 10px 0; font-size: 1rem; color: #aaa; border-bottom: 1px solid #444; padding-bottom: 8px; }
        .playlist-item { padding: 12px; margin-bottom: 8px; background: #444; border-radius: 6px; cursor: pointer; transition: 0.2; font-size: 0.9rem; }
        .playlist-item:hover { background: #555; }
        .playlist-item.active { background: #00a1d6; color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <h2>kmrb切片合集库 🎬</h2>
    
    <div class="main-layout">
        <div class="video-container">
            <video id="main-player" controls preload="auto" src="01.mp4"></video>
        </div>
        
        <div class="playlist">
            <h3>视频列表</h3>
            <div class="playlist-item active" onclick="changeVideo('01.mp4', this)">【58会限切】羊宫妃那：准备演出要顾及很多事……</div>
            <div class="playlist-item" onclick="changeVideo('5701.mp4', this)">【57会限切1】活在上个年代的大众动画宅女羊宫妃那</div>
            <div class="playlist-item" onclick="changeVideo('5702-1.m4v', this)">【57会限切2】关于你羊万年不变的公式照</div>
            <div class="playlist-item" onclick="changeVideo('5703.mp4', this)">【57本篇切】压力爆缸……暂时撤退也是战略（）</div>
            <div class="playlist-item" onclick="changeVideo('Tanjonichikai-1.m4v', this)">【诞生日会/昼】妃那想要传递给你的“契机”，去创造自己的幸福圆环</div>
        </div>
    </div>

    <script>
        function changeVideo(videoSrc, element) {
            var player = document.getElementById('main-player');
            player.src = videoSrc;
            player.play();
            document.querySelectorAll('.playlist-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
